<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Summit Ridge Solutions — AI-powered websites &amp; automations</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
/* Nodecraft — AI web agency landing
   Type: Geist + Geist Mono
   Palette: warm off-white / near-black / single accent (tweakable) */

:root {
  --bg: #F3EFEA;
  --bg-2: #ECE7E0;
  --ink: #0E0E0E;
  --ink-2: #1A1A1A;
  --muted: #6E6A64;
  --muted-2: #9A958D;
  --rule: #D9D3CA;
  --card: #FFFFFF;
  --accent: #F04E2C;
  --accent-ink: #FFFFFF;
  --dark: #0B0B0C;
  --dark-2: #141416;
  --dark-rule: #25252A;
  --dark-muted: #8A8A92;
  --radius: 18px;
  --radius-lg: 26px;
  --maxw: 1440px;
  --gutter: 40px;
}

* { box-sizing: border-box; }
html { zoom: 0.75; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Geist', ui-sans-serif, system-ui, -apple-system, sans-serif;
  font-size: 18px;
  line-height: 1.6;
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
  font-feature-settings: "ss01", "cv11";
}

.mono { font-family: 'Geist Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

a { color: inherit; text-decoration: none; }
button { font: inherit; cursor: pointer; }

.wrap {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 var(--gutter);
}

/* ── Eyebrow ─────────────────────────────────────── */
.eyebrow {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 13px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--ink);
  display: inline-flex;
  align-items: center;
  gap: 8px;
}
.eyebrow::before, .eyebrow::after { content: "//"; color: var(--ink); }

/* ── Section primitive ───────────────────────────── */
section { padding: 88px 0; }
section.tight { padding: 56px 0; }
section.dark { background: var(--dark); color: #F4F2EE; }

h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.02em; }
.display {
  font-size: clamp(47px, 7.5vw, 108px);
  line-height: 0.94;
  font-weight: 600;
  letter-spacing: -0.035em;
  text-transform: uppercase;
}
.display-md {
  font-size: clamp(38px, 5.2vw, 70px);
  line-height: 1.02;
  font-weight: 600;
  letter-spacing: -0.03em;
  text-transform: uppercase;
}
.h-lede {
  font-size: clamp(26px, 2.8vw, 35px);
  line-height: 1.25;
  font-weight: 500;
  letter-spacing: -0.015em;
}
.body { color: var(--muted); font-size: 17px; line-height: 1.6; }

/* ── Buttons ─────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 14px;
  height: 54px;
  padding: 0 8px 0 22px;
  border-radius: 999px;
  background: var(--accent);
  color: var(--accent-ink);
  font-weight: 500;
  font-size: 17px;
  border: 0;
  transition: transform .12s ease, filter .12s ease;
  letter-spacing: -0.005em;
}
.btn:hover { transform: scale(1.04); }
.btn .arr {
  width: 32px; height: 32px;
  border-radius: 999px;
  background: rgba(255,255,255,0.18);
  display: grid; place-items: center;
}
.btn-ghost {
  background: transparent;
  color: var(--ink);
  border: 1px solid var(--rule);
}
.btn-ghost .arr { background: var(--ink); color: #fff; }
.btn-dark { background: var(--ink); color: #fff; }
.btn-dark .arr { background: rgba(255,255,255,0.16); }

/* ── Nav ─────────────────────────────────────────── */
.nav {
  position: sticky; top: 0; z-index: 50;
  backdrop-filter: blur(20px);
  background: rgba(243,239,234,0.78);
  border-bottom: 1px solid rgba(217,211,202,0.6);
}
.nav-inner {
  display: flex; align-items: center; justify-content: space-between;
  height: 90px;
}
.brand { display: flex; align-items: center; gap: 10px; font-weight: 600; font-size: 24px; letter-spacing: -0.02em; }
.brand-mark {
  width: 34px; height: 34px; border-radius: 8px; background: var(--accent);
  display: grid; place-items: center; color: #fff;
  position: relative;
}
.brand-mark::before {
  content: ""; position: absolute; inset: 7px;
  border: 2px solid #fff; border-radius: 3px; transform: rotate(45deg);
}
.brand-mark::after {
  content: ""; position: absolute; width: 6px; height: 6px; background: #fff; border-radius: 999px;
}
.nav-links {
  display: flex; gap: 4px;
  background: #fff;
  border: 1px solid var(--rule);
  border-radius: 999px;
  padding: 5px;
}
.nav-links a {
  padding: 10px 22px; border-radius: 999px;
  font-size: 18px; font-weight: 500; color: var(--ink-2);
  transition: background .15s ease;
}
.nav-links a:hover { background: var(--bg-2); }
.nav-links a.active { background: var(--ink); color: #fff; }
.nav-cta { display: flex; gap: 8px; align-items: center; }

/* ── Hero ────────────────────────────────────────── */
.hero { padding: 24px 0 96px; }
.hero-card {
  position: relative;
  border-radius: var(--radius-lg);
  overflow: hidden;
  aspect-ratio: 16/8.3;
  background: #1a1d24;
  isolation: isolate;
}
.hero-image {
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse at 70% 30%, rgba(56,89,140,0.35), transparent 60%),
    linear-gradient(135deg, #0d2547 0%, #163a6e 35%, #1e5aa3 70%, #2a7ed6 100%);
}
.hero-image::before {
  /* Decorative tech grid */
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.06) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.06) 1px, transparent 1px);
  background-size: 56px 56px, 56px 56px;
  background-position: center;
  mask-image: radial-gradient(ellipse at 50% 40%, #000 30%, transparent 80%);
}
.hero-image::after {
  display: none;
}
.hero-window {
  position: absolute;
  right: 3%;
  top: 10%;
  width: 42%;
  height: 58%;
  border-radius: 14px;
  background: #fbfaf7;
  box-shadow: 0 30px 80px rgba(0,0,0,0.28), 0 0 0 1px rgba(255,255,255,0.06);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  font-family: 'Geist Mono', ui-monospace, monospace;
  z-index: 1;
  opacity: 0.62;
  filter: saturate(0.9);
  mask-image: linear-gradient(180deg, #000 0%, #000 70%, rgba(0,0,0,0.35) 100%);
  -webkit-mask-image: linear-gradient(180deg, #000 0%, #000 70%, rgba(0,0,0,0.35) 100%);
}
.hero-tag, .hero-content { z-index: 3; }
.hero-overlay { z-index: 2; }

/* Typing animation on first paint */
.hw-code > div {
  overflow: hidden;
  white-space: pre;
  width: 0;
  animation: hw-type 0.55s steps(30, end) forwards;
}
.hw-code > div.hw-spacer { animation: none; width: 100%; }
.hw-code > div:nth-child(1)  { animation-delay: 0.30s; }
.hw-code > div:nth-child(2)  { animation-delay: 0.85s; }
.hw-code > div:nth-child(3)  { animation-delay: 1.30s; }
.hw-code > div:nth-child(4)  { animation-delay: 1.70s; }
.hw-code > div:nth-child(5)  { animation-delay: 2.05s; }
.hw-code > div:nth-child(6)  { animation-delay: 2.40s; }
.hw-code > div:nth-child(7)  { animation-delay: 2.75s; }
.hw-code > div:nth-child(8)  { animation-delay: 3.05s; }
.hw-code > div:nth-child(9)  { animation-delay: 3.30s; }
.hw-code > div:nth-child(11) { animation-delay: 3.55s; animation-duration: 0.6s; }
@keyframes hw-type {
  from { width: 0; }
  to   { width: 100%; }
}
.hw-chrome {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  background: #f0ede5;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.hw-chrome > span { width: 10px; height: 10px; border-radius: 999px; flex: 0 0 auto; }
.hw-tab {
  margin-left: 10px;
  padding: 4px 10px;
  background: #fff;
  border-radius: 6px;
  font-size: 11px;
  color: #4a4640;
  border: 1px solid rgba(0,0,0,0.05);
}
.hw-deploy {
  margin-left: auto;
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 10.5px;
  color: #5a5650;
  background: #fff;
  padding: 4px 10px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.06);
  white-space: nowrap;
}
.hw-dot { width: 6px; height: 6px; border-radius: 999px; background: #2ea05e; box-shadow: 0 0 6px #2ea05e; }
.hw-body {
  display: flex;
  flex: 1;
  min-height: 0;
  background: #fff;
}
.hw-gutter {
  display: flex; flex-direction: column;
  padding: 14px 8px 14px 14px;
  font-size: 11px;
  color: #b8b1a6;
  text-align: right;
  background: #fbfaf7;
  border-right: 1px solid rgba(0,0,0,0.05);
  user-select: none;
}
.hw-gutter span { line-height: 1.6; }
.hw-code {
  flex: 1; min-width: 0;
  padding: 14px 16px;
  font-size: 12px;
  line-height: 1.6;
  color: #2a2823;
  white-space: pre;
}
.hw-code > div { white-space: pre; }
.hw-code .ind { padding-left: 0; }
.hw-code .c-kw   { color: #b94a2c; font-weight: 600; }
.hw-code .c-fn   { color: #5a3a8a; font-weight: 600; }
.hw-code .c-tag  { color: #2a6f8a; font-weight: 600; }
.hw-code .c-attr { color: #8a6a1f; }
.hw-code .c-str  { color: #2a7050; }
.hw-spacer { height: 12px; }
.hw-status {
  margin-top: 10px;
  font-size: 11px;
  color: #5a5650;
  border-top: 1px dashed rgba(0,0,0,0.08);
  padding-top: 10px;
}
.hw-status .hw-ok { color: #2ea05e; }
@media (max-width: 960px) {
  .hero-window { display: none; }
}
.hero-overlay {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(8,16,32,0) 30%, rgba(8,16,32,0.65) 100%);
}
.hero-content {
  position: absolute; left: 48px; right: 48px; bottom: 44px;
  display: flex; align-items: flex-end; justify-content: space-between; gap: 24px;
}
.hero-tag {
  position: absolute; left: 48px; top: 20px;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 8px 14px; border-radius: 999px;
  background: rgba(255,255,255,0.14);
  border: 1px solid rgba(255,255,255,0.22);
  color: #fff;
  font-family: 'Geist Mono', monospace; font-size: 13px; letter-spacing: 0.04em;
}
.hero-tag .dot { width: 6px; height: 6px; background: #5BE889; border-radius: 999px; box-shadow: 0 0 8px #5BE889; }
.hero h1 { color: #fff; max-width: 12ch; }
.hero p.hero-sub { color: rgba(255,255,255,0.78); margin: 18px 0 24px; max-width: 44ch; font-size: 18px; }
.hero-preview {
  width: 260px;
  background: #fff;
  border-radius: 14px;
  padding: 12px;
  display: flex; gap: 12px; align-items: center;
  box-shadow: 0 18px 48px rgba(0,0,0,0.35);
}
.hero-preview .thumb {
  width: 88px; height: 56px; border-radius: 8px;
  background:
    linear-gradient(135deg, #14241f, #0a1d4a);
  position: relative; overflow: hidden;
}
.hero-preview .thumb::after {
  content: "▶"; position: absolute; inset: 0; display: grid; place-items: center;
  color: #fff; font-size: 14px;
}
.hero-preview .meta { flex: 1; }
.hero-preview .meta .label { font-size: 12px; color: var(--muted); font-family: 'Geist Mono', monospace; text-transform: uppercase; letter-spacing: 0.04em; }
.hero-preview .meta .title { font-size: 14px; font-weight: 500; margin-top: 2px; }
.hero-preview .num { font-family: 'Geist Mono', monospace; font-size: 12px; color: var(--muted); }

/* ── About / Stats ───────────────────────────────── */
.about-grid {
  display: grid;
  grid-template-columns: 1fr 1.4fr;
  gap: 72px;
  align-items: start;
}
.about-mark {
  font-family: 'Geist Mono', monospace;
  font-size: 13px;
  letter-spacing: 0.04em;
  color: var(--muted);
  margin-top: 12px;
}
.about-watermark {
  margin-top: 32px;
  width: 100%; aspect-ratio: 1.4/1;
  border-radius: 18px;
  background: var(--bg-2);
  position: relative;
  overflow: hidden;
  display: grid; place-items: center;
}
.about-watermark svg { width: 70%; height: auto; opacity: 0.45; }
.about-lede { font-size: clamp(26px, 2.5vw, 35px); line-height: 1.4; font-weight: 500; letter-spacing: -0.01em; }
.about-lede em { font-style: normal; color: var(--muted); }
.stats {
  margin-top: 48px;
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 0;
  border-top: 1px solid var(--rule);
  padding-top: 24px;
}
.stat .num { font-size: 66px; font-weight: 500; letter-spacing: -0.04em; line-height: 1; }
.stat .num small { color: var(--accent); font-size: 38px; font-weight: 500; margin-left: 2px; }
.stat .lbl { margin-top: 14px; color: var(--muted); font-size: 16px; }

/* ── Services ────────────────────────────────────── */
.svc-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 24px; margin-bottom: 32px; }
.svc-head .right { display: flex; align-items: center; gap: 16px; color: var(--muted); font-family: 'Geist Mono', monospace; font-size: 14px; letter-spacing: 0.04em; }
.arr-btn {
  width: 40px; height: 40px; border-radius: 999px;
  border: 1px solid var(--rule); background: transparent;
  display: grid; place-items: center; color: var(--ink);
  transition: background .15s ease, color .15s ease;
}
.arr-btn:hover { background: var(--ink); color: #fff; }
.svc-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.svc-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
  display: flex; flex-direction: column;
}
.svc-media {
  aspect-ratio: 16/10;
  position: relative;
  overflow: hidden;
}
.svc-meta {
  padding: 18px 20px 22px;
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
}
.svc-meta h3 { font-size: 22px; font-weight: 500; letter-spacing: -0.015em; }
.svc-meta .when { font-family: 'Geist Mono', monospace; font-size: 14px; color: var(--muted); white-space: nowrap; }

/* the third "row": small image + lede + CTA */
.svc-row {
  margin-top: 20px;
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 28px;
  align-items: center;
}
.svc-row-card {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  overflow: hidden;
}
.svc-row-card .svc-media { aspect-ratio: 1.4/1; }
.svc-row-card .svc-meta { padding: 14px 16px; }
.svc-row-card .svc-meta h3 { font-size: 17px; }
.svc-row-card .svc-meta .when { font-size: 12px; }
.svc-pitch {
  font-size: clamp(23px, 2.1vw, 33px);
  line-height: 1.35; font-weight: 500; letter-spacing: -0.015em;
  max-width: 32ch;
}
.svc-pitch .cta-line { margin-top: 22px; }

/* Image placeholders (intentional, labeled) */
.imgph {
  position: absolute; inset: 0;
  background:
    repeating-linear-gradient(135deg,
      var(--ph-a, #d8d3cb) 0 14px,
      var(--ph-b, #c9c3b9) 14px 28px);
  display: grid; place-items: center;
}
.imgph .imgph-card {
  background: rgba(255,255,255,0.85);
  border-radius: 8px;
  padding: 8px 12px;
  font-family: 'Geist Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: #2a2a2a;
}
.svc-media.theme-blue { --ph-a: #1d3354; --ph-b: #16284a; }
.svc-media.theme-blue .imgph-card { background: rgba(255,255,255,0.92); }
.svc-media.theme-orange { --ph-a: #f47956; --ph-b: #e8633e; }

/* Workflow mock — SVG diagram, scroll-reveal, in a friendly browser frame */
.workflow-shot { background: #ece6dc; overflow: hidden; }
.wf-inner { position: absolute; inset: 0; padding: 14px; display: flex; }
.wf-browser {
  flex: 1;
  display: flex; flex-direction: column;
  background: #fbf8f3;
  border-radius: 12px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
  overflow: hidden;
  min-width: 0;
}
.wf-chrome {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  background: #f0ebe2;
  border-bottom: 1px solid rgba(0,0,0,0.06);
}
.wf-dots { display: flex; gap: 5px; }
.wf-dots span { width: 9px; height: 9px; border-radius: 999px; display: inline-block; }
.wf-url {
  flex: 1; min-width: 0;
  display: inline-flex; align-items: center; gap: 6px;
  height: 22px; padding: 0 10px;
  background: #fff;
  border-radius: 999px;
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 10.5px; color: #7a756c;
  overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
  max-width: 60%;
  margin: 0 auto;
}
.wf-tab-actions { display: flex; gap: 4px; }
.wf-tab-actions span { width: 4px; height: 4px; border-radius: 999px; background: #b8b1a6; display: inline-block; }
.wf-stage { flex: 1; min-height: 0; padding: 6px 4px 10px; }
.wf-svg { width: 100%; height: 100%; }
.wf-svg text { user-select: none; }
.wf-edges path { transition: opacity .25s ease; }
.svc-media.theme-orange .imgph-card { background: rgba(255,255,255,0.92); }
.svc-media.theme-graphite { --ph-a: #2a2a2e; --ph-b: #1c1c20; }

/* Website mock — natural 1200×900 scaled into the card */
.website-shot { background: #c9d4dc; overflow: hidden; container-type: inline-size; }
.wm-inner { position: absolute; inset: 0; container-type: inline-size; }
.wm-frame {
  width: 1200px; height: 900px;
  transform-origin: top left;
  transform: scale(calc(100cqw / 1200));
  position: relative;
  font-family: 'Inter', 'Geist', ui-sans-serif, system-ui, sans-serif;
  color: #fff;
}
/* parallax background layers */
.wm-bg { position: absolute; inset: 0; overflow: hidden; }
.wm-bg > * { position: absolute; left: 0; right: 0; will-change: transform; }
.wm-sky {
  top: 0; height: 60%;
  background: linear-gradient(180deg, #d6e3ec 0%, #c2cfd9 60%, #b6c0c8 100%);
  transform: translateY(calc(var(--wm-py, 0px) * 0.2));
}
.wm-clouds {
  top: 4%; height: 22%;
  background:
    radial-gradient(ellipse 180px 28px at 18% 40%, rgba(255,255,255,0.55), transparent 70%),
    radial-gradient(ellipse 240px 32px at 62% 60%, rgba(255,255,255,0.5), transparent 70%),
    radial-gradient(ellipse 160px 22px at 88% 30%, rgba(255,255,255,0.4), transparent 70%);
  transform: translateY(calc(var(--wm-py, 0px) * 0.35));
}
.wm-ridge {
  top: 50%; height: 22%;
  background:
    radial-gradient(ellipse 700px 80px at 30% 100%, #8a9483 0%, #8a9483 60%, transparent 62%),
    radial-gradient(ellipse 900px 100px at 80% 100%, #7c8676 0%, #7c8676 60%, transparent 62%);
  filter: blur(1px);
  transform: translateY(calc(var(--wm-py, 0px) * 0.5));
}
.wm-hill {
  bottom: 0; height: 55%;
  background:
    radial-gradient(ellipse 1400px 280px at 50% 100%, #6b7a4f 0%, #6b7a4f 65%, transparent 67%);
  transform: translateY(calc(var(--wm-py, 0px) * 0.7));
}
.wm-grass {
  bottom: 0; height: 30%;
  background:
    radial-gradient(ellipse 1600px 320px at 50% 110%, #4f5d36 0%, #4f5d36 70%, transparent 72%);
  transform: translateY(calc(var(--wm-py, 0px) * 0.85));
}
/* cabin shape, sits on the hill */
.wm-cabin {
  position: absolute; left: 38%; top: 36%;
  width: 220px; height: 130px;
  background: #b8a98f;
  border-radius: 6px;
  box-shadow: inset 0 -20px 0 rgba(0,0,0,0.15), 0 18px 30px rgba(0,0,0,0.18);
  transform: translateY(calc(var(--wm-py, 0px) * 0.7));
}
.wm-cabin-roof {
  position: absolute; left: -6px; right: -6px; top: -8px; height: 12px;
  background: #2a2a2a; border-radius: 3px;
}
.wm-cabin-door {
  position: absolute; right: 20px; bottom: 0; width: 38px; height: 70px;
  background: #5a5045; border-radius: 3px 3px 0 0;
}
.wm-cabin-win {
  position: absolute; left: 24px; top: 32px; width: 28px; height: 28px;
  background: #5d6c75; border: 3px solid #b8a98f; border-radius: 2px;
}
.wm-cabin-win.two { left: 64px; }

/* foreground card — the actual page chrome */
.wm-card {
  position: absolute; left: 32px; right: 32px; top: 32px;
  height: 700px;
  border-radius: 18px;
  background: linear-gradient(180deg, rgba(40,46,52,0.35) 0%, rgba(40,46,52,0.55) 60%, rgba(30,36,40,0.7) 100%);
  backdrop-filter: blur(0.5px);
  overflow: hidden;
  padding: 28px 36px 36px;
  box-sizing: border-box;
}
.wm-nav { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.wm-brand { font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
.wm-links { display: flex; gap: 32px; font-size: 15px; opacity: 0.92; }
.wm-nav-right { display: flex; align-items: center; gap: 14px; }
.wm-cart { width: 34px; height: 34px; border-radius: 999px; background: rgba(255,255,255,0.14); display: grid; place-items: center; }
.wm-contact {
  display: inline-flex; align-items: center; gap: 10px;
  height: 36px; padding: 0 6px 0 16px;
  border-radius: 999px;
  background: #1a1a1a; color: #fff; font-size: 14px;
}
.wm-arr { width: 24px; height: 24px; border-radius: 999px; background: rgba(255,255,255,0.16); display: grid; place-items: center; }

.wm-eyebrow { margin-top: 56px; font-size: 14px; opacity: 0.9; }
.wm-icons { position: absolute; right: 36px; top: 96px; display: flex; gap: 10px; }
.wm-ico { width: 44px; height: 44px; border-radius: 999px; display: grid; place-items: center; }
.wm-ico-dark { background: #1a1a1a; }
.wm-ico-lime { background: #c8f24a; }

.wm-blurb {
  position: absolute; right: 36px; top: 160px;
  max-width: 320px; text-align: right;
  font-size: 14px; line-height: 1.5; opacity: 0.92;
}

.wm-display {
  position: absolute; left: 36px; bottom: 100px;
  font-size: 124px; font-weight: 600; letter-spacing: -0.035em;
  line-height: 0.98;
}
.wm-display div { color: #fff; }

.wm-scroll {
  position: absolute; right: 36px; bottom: 36px;
  font-size: 13px; opacity: 0.9;
  display: inline-flex; align-items: center; gap: 8px;
}
.wm-scroll span { font-size: 14px; }

.wm-belowfold {
  position: absolute; left: 32px; right: 32px; top: 760px;
  display: grid; grid-template-columns: 200px 1fr; gap: 32px;
  padding: 0 4px;
  color: #1c1c1c;
}
.wm-bf-label { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 13px; color: #2a2a2a; }
.wm-bf-text { font-size: 28px; line-height: 1.3; letter-spacing: -0.01em; color: #1c1c1c; max-width: 720px; }

.wm-links span { padding: 6px 4px; border-radius: 999px; transition: background .2s ease, color .2s ease; }
.wm-link-active {
  background: rgba(255,255,255,0.16);
  padding: 6px 14px !important;
  color: #fff;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.18) inset, 0 6px 16px rgba(0,0,0,0.18);
}

.wm-cursor {
  position: absolute;
  width: 28px; height: 28px;
  pointer-events: none;
  transition: left .15s linear, top .15s linear;
  filter: drop-shadow(0 4px 6px rgba(0,0,0,0.35));
  z-index: 5;
}
.wm-click-ring {
  position: absolute;
  left: -6px; top: -2px;
  width: 36px; height: 36px;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.9);
  animation: wm-click-pulse .55s ease-out forwards;
}
@keyframes wm-click-pulse {
  0%   { transform: scale(0.4); opacity: 0.9; }
  100% { transform: scale(1.6); opacity: 0; }
}
.svc-media.theme-graphite .imgph-card { background: rgba(255,255,255,0.92); }
.svc-media.theme-cream { --ph-a: #e7e1d6; --ph-b: #ddd6c8; }

/* Notion Kanban mock — scale a "natural" 1280×720 design down to fit any card */
.notion-shot { background: #191919; overflow: hidden; }
.notion-shot-inner { position: absolute; inset: 0; container-type: inline-size; will-change: transform; }
.nk-frame {
  width: 2100px;
  height: 1180px;
  transform-origin: top left;
  transform: scale(var(--nk-scale, 0.36));
  background: #fbf8f3;
  color: #2a2823;
  font-family: 'Inter', 'Geist', ui-sans-serif, system-ui, sans-serif;
  font-size: 14px;
  padding: 44px 52px;
  box-sizing: border-box;
}
.notion-shot { container-type: inline-size; }
.notion-shot-inner { container-type: inline-size; }
/* fluid scale: card is ~280px → 280/1280 ≈ 0.22; but row-card sits in a 1fr column on wider screens so we let it grow */
@container (min-width: 0) { .nk-frame { transform: scale(calc(96cqw / 2100)); } }
.nk-head { display: flex; align-items: center; justify-content: space-between; }
.nk-title { display: flex; align-items: center; gap: 16px; font-size: 36px; font-weight: 700; letter-spacing: -0.01em; color: #2a2823; }
.nk-camera { width: 40px; height: 40px; display: grid; place-items: center; }
.nk-tabs { display: flex; gap: 6px; margin-top: 14px; }
.nk-tab { display: inline-flex; align-items: center; gap: 10px; padding: 8px 14px; border-radius: 8px; font-size: 15px; color: #9a958d; }
.nk-tab.active { background: #f0ebe2; color: #2a2823; }

.nk-board {
  margin-top: 0;
  display: grid;
  grid-template-columns: repeat(6, 1fr);
  gap: 26px;
  height: 100%;
  position: relative;
}
.nk-col { display: flex; flex-direction: column; gap: 22px; min-width: 0; }
.nk-col-head {
  border-radius: 999px;
  padding: 18px 24px;
  font-size: 28px; font-weight: 600;
  text-align: center;
  letter-spacing: -0.005em;
}
.nk-card {
  border-radius: 24px;
  padding: 28px 24px;
  display: flex; flex-direction: column; gap: 18px;
  position: relative;
}
.nk-card.live::after {
  content: "";
  position: absolute; inset: -2px;
  border-radius: 24px;
  pointer-events: none;
  box-shadow: 0 0 0 0 rgba(0,0,0,0.0);
  animation: nk-pulse 2.8s ease-in-out infinite;
}
.nk-card.live[data-glow="blue"]::after   { box-shadow: 0 0 0 0 rgba(24,95,165,0.0);  animation-name: nk-pulse-blue; }
.nk-card.live[data-glow="amber"]::after  { box-shadow: 0 0 0 0 rgba(133,79,11,0.0);  animation-name: nk-pulse-amber; }
.nk-card.live[data-glow="orange"]::after { box-shadow: 0 0 0 0 rgba(153,60,29,0.0);  animation-name: nk-pulse-orange; }
.nk-card.live[data-glow="green"]::after  { box-shadow: 0 0 0 0 rgba(15,110,86,0.0);  animation-name: nk-pulse-green; }
.nk-card.live[data-glow="purple"]::after { box-shadow: 0 0 0 0 rgba(83,74,183,0.0);  animation-name: nk-pulse-purple; }
.nk-card.live[data-glow="pink"]::after   { box-shadow: 0 0 0 0 rgba(153,53,86,0.0);  animation-name: nk-pulse-pink; }
@keyframes nk-pulse-blue   { 0%,100% { box-shadow: 0 0 0 0 rgba(24,95,165,0); } 50% { box-shadow: 0 0 0 6px rgba(24,95,165,0.18); } }
@keyframes nk-pulse-amber  { 0%,100% { box-shadow: 0 0 0 0 rgba(239,159,39,0); } 50% { box-shadow: 0 0 0 6px rgba(239,159,39,0.22); } }
@keyframes nk-pulse-orange { 0%,100% { box-shadow: 0 0 0 0 rgba(216,90,48,0); } 50% { box-shadow: 0 0 0 6px rgba(216,90,48,0.22); } }
@keyframes nk-pulse-green  { 0%,100% { box-shadow: 0 0 0 0 rgba(29,158,117,0); } 50% { box-shadow: 0 0 0 6px rgba(29,158,117,0.22); } }
@keyframes nk-pulse-purple { 0%,100% { box-shadow: 0 0 0 0 rgba(127,119,221,0); } 50% { box-shadow: 0 0 0 6px rgba(127,119,221,0.22); } }
@keyframes nk-pulse-pink   { 0%,100% { box-shadow: 0 0 0 0 rgba(212,83,126,0); } 50% { box-shadow: 0 0 0 6px rgba(212,83,126,0.22); } }

/* Bars subtly shimmer to feel "live" */
.nk-bbar, .nk-bmini {
  background-size: 200% 100% !important;
  background-image: linear-gradient(90deg, var(--bar-base, currentColor) 0%, rgba(255,255,255,0.55) 50%, var(--bar-base, currentColor) 100%) !important;
  animation: nk-shimmer 4.5s linear infinite;
}
@keyframes nk-shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

/* Moving "new task" chip that traverses columns */
.nk-flyer {
  position: absolute;
  top: 200px;
  left: 0;
  width: 180px; height: 64px;
  border-radius: 16px;
  background: #fff;
  box-shadow: 0 12px 30px rgba(0,0,0,0.12), 0 0 0 1px rgba(0,0,0,0.04);
  display: flex; align-items: center; gap: 12px;
  padding: 0 16px;
  animation: nk-fly 14s ease-in-out infinite;
  pointer-events: none;
  z-index: 3;
}
.nk-flyer .fdot { width: 22px; height: 22px; border-radius: 999px; background: #F0997B; }
.nk-flyer .fbars { flex: 1; display: flex; flex-direction: column; gap: 6px; }
.nk-flyer .fbar { height: 8px; border-radius: 8px; background: #f0ebe2; }
.nk-flyer .fbar.short { width: 60%; }
@keyframes nk-fly {
  0%   { transform: translate(120px, 0);    opacity: 0; }
  6%   { transform: translate(120px, 0);    opacity: 1; }
  18%  { transform: translate(440px, 30px); opacity: 1; }
  32%  { transform: translate(760px, 0);    opacity: 1; }
  46%  { transform: translate(1080px, 40px); opacity: 1; }
  60%  { transform: translate(1400px, 20px); opacity: 1; }
  74%  { transform: translate(1720px, 0);   opacity: 1; }
  82%  { transform: translate(1720px, 0);   opacity: 0; }
  100% { transform: translate(120px, 0);    opacity: 0; }
}

/* ── Why-choose ──────────────────────────────────── */
.why {
  margin: 24px auto 0;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  display: grid;
  grid-template-columns: 1fr 1fr;
  min-height: 560px;
  background: var(--dark);
  color: #fff;
}
.why-left {
  position: relative;
  padding: 40px;
  display: flex; flex-direction: column; justify-content: space-between;
  align-items: flex-start;
  overflow: hidden;
}
.why-left::before {
  content: ""; position: absolute; inset: 0;
  background:
    linear-gradient(180deg, rgba(11,11,12,0.0) 0%, rgba(11,11,12,0.75) 100%),
    repeating-linear-gradient(135deg, #1b2230 0 14px, #141a25 14px 28px);
}
.why-left > * { position: relative; }
.why-left .eyebrow { color: rgba(255,255,255,0.9); }
.why-left .eyebrow::before, .why-left .eyebrow::after { color: rgba(255,255,255,0.9); }
.why-left h2 { color: #fff; max-width: 14ch; margin-top: 14px; }
.why-right { padding: 32px; display: flex; flex-direction: column; gap: 14px; background: rgba(11,11,12,0.6); backdrop-filter: blur(2px); }
.why-card {
  background: #fff;
  color: var(--ink);
  border-radius: 14px;
  padding: 20px 22px;
  display: grid; grid-template-columns: 44px 1fr; gap: 16px;
  align-items: start;
}
.why-card .ico {
  width: 44px; height: 44px; border-radius: 12px;
  background: var(--bg);
  display: grid; place-items: center; color: var(--ink);
}
.why-card h4 { font-size: 19px; font-weight: 500; letter-spacing: -0.01em; }
.why-card p { margin: 4px 0 0; font-size: 16px; line-height: 1.6; color: var(--muted); }

/* ── Testimonials ────────────────────────────────── */
.tst {
  display: grid;
  grid-template-columns: 280px 1fr;
  gap: 64px;
  align-items: start;
  padding-top: 8px;
  border-top: 1px solid var(--rule);
  margin-top: 16px;
  padding-top: 36px;
}
.tst .meta-label { font-family: 'Geist Mono', monospace; font-size: 13px; letter-spacing: 0.06em; color: var(--muted); text-transform: uppercase; max-width: 22ch; line-height: 1.5; }
.tst .pct { font-size: 112px; font-weight: 500; letter-spacing: -0.05em; line-height: 1; margin-top: 18px; }
.tst .pct .plus { color: var(--accent); font-size: 65px; vertical-align: top; margin-right: 2px; }
.tst .pct small { font-size: 65px; color: var(--accent); margin-left: 2px; font-weight: 500; }
.tst .pct-lbl { color: var(--muted); margin-top: 8px; font-size: 16px; }

.tst-quote {
  font-size: clamp(26px, 2.8vw, 38px);
  line-height: 1.35; letter-spacing: -0.015em; font-weight: 500;
  max-width: 30ch;
}
.tst-foot { margin-top: 32px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
.tst-author { display: flex; align-items: center; gap: 14px; }
.avatar {
  width: 44px; height: 44px; border-radius: 999px;
  background: linear-gradient(135deg, #c9c3b9, #8a847a);
  position: relative; overflow: hidden;
}
.avatar::after { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at 50% 38%, rgba(255,255,255,0.5), transparent 30%); }
.tst-author .name { font-weight: 500; }
.tst-author .role { color: var(--muted); font-size: 15px; }

.brands {
  margin-top: 56px;
}
.brands .lbl { font-family: 'Geist Mono', monospace; font-size: 11.5px; color: var(--muted); letter-spacing: 0.04em; }
.brands .lbl::before { content: "• "; }
.brand-row {
  margin-top: 14px;
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px;
}
.brand-tile {
  background: var(--card);
  border: 1px solid var(--rule);
  border-radius: 14px;
  height: 76px;
  display: grid; place-items: center;
  color: var(--ink);
  font-weight: 500; font-size: 17px; letter-spacing: -0.01em;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.brand-tile.muted { background: var(--bg-2); }
.brand-tile svg { width: 22px; height: 22px; }

/* ── FAQ ─────────────────────────────────────────── */
.faq-head { display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: end; margin-bottom: 24px; }
.faq-head .right { color: var(--muted); font-size: 17px; line-height: 1.6; max-width: 48ch; }
.faq-item {
  border-top: 1px solid var(--rule);
  padding: 22px 0;
  display: grid;
  grid-template-columns: 56px 1fr 1fr;
  gap: 32px;
  align-items: start;
  cursor: pointer;
}
.faq-item:last-of-type { border-bottom: 1px solid var(--rule); }

/* Reveal-on-scroll */
.reveal {
  opacity: 0;
  transform: translateY(18px);
  transition: opacity .55s cubic-bezier(.2,.7,.2,1), transform .55s cubic-bezier(.2,.7,.2,1);
  will-change: opacity, transform;
}
.reveal.in-view {
  opacity: 1;
  transform: none;
}
.faq-item .qnum {
  width: 32px; height: 32px; border-radius: 999px;
  border: 1px solid var(--rule);
  display: grid; place-items: center;
  font-family: 'Geist Mono', monospace; font-size: 14px;
}
.faq-item[data-open="true"] .qnum { background: var(--ink); color: #fff; border-color: var(--ink); }
.faq-item .q { font-size: 20px; font-weight: 500; letter-spacing: -0.01em; }
.faq-item .a { color: var(--muted); font-size: 17px; line-height: 1.65; max-width: 48ch; }
/* faq collapsed: handled by max-height transition */

/* ── Final CTA ───────────────────────────────────── */
.final {
  margin: 8px auto 0;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  min-height: 280px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  background: var(--dark);
  color: #fff;
}
.final-left { padding: 56px 48px; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-start; gap: 32px; }
.final-left h2 { color: #fff; max-width: 14ch; }
.final-left p { color: rgba(255,255,255,0.7); max-width: 42ch; font-size: 17px; }
.final-right {
  position: relative;
  background:
    radial-gradient(ellipse at 80% 30%, rgba(56,89,140,0.4), transparent 60%),
    linear-gradient(135deg, #0d2547 0%, #16345a 50%, #1e5aa3 100%);
  overflow: hidden;
}
.final-right::before {
  content: ""; position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(255,255,255,0.07) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.07) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse at 60% 50%, #000 30%, transparent 80%);
}
.final-right::after {
  content: "";
  position: absolute;
  right: -10%; bottom: -10%;
  width: 80%; height: 75%;
  border-radius: 14px;
  background: linear-gradient(180deg, #f5f4f1 0%, #f5f4f1 12%, #ffffff 12%);
  background-image:
    radial-gradient(circle at 14px 16px, #ff5f57 4px, transparent 5px),
    radial-gradient(circle at 32px 16px, #febc2e 4px, transparent 5px),
    radial-gradient(circle at 50px 16px, #28c840 4px, transparent 5px),
    linear-gradient(180deg, #f5f4f1 0%, #f5f4f1 12%, #ffffff 12%);
  background-repeat: no-repeat;
  box-shadow: 0 30px 80px rgba(0,0,0,0.35);
}

/* ── Contact Form ────────────────────────────────── */
.cf-layout {
  display: grid;
  grid-template-columns: 1fr 1.5fr;
  gap: 80px;
  align-items: start;
}
.cf-left { position: sticky; top: 104px; }
.cf-left h2 { max-width: 12ch; }
.cf-lede {
  margin-top: 20px;
  font-size: 17px;
  line-height: 1.65;
  color: var(--muted);
  max-width: 38ch;
}
.cf-promises { margin-top: 36px; display: flex; flex-direction: column; gap: 13px; }
.cf-promise { display: flex; align-items: center; gap: 12px; font-size: 16px; color: var(--muted); }
.cf-check { width: 22px; height: 22px; border-radius: 999px; background: var(--accent); display: grid; place-items: center; flex-shrink: 0; }
.cf-card { background: var(--card); border: 1px solid var(--rule); border-radius: var(--radius-lg); padding: 40px; }
.cf-form { display: flex; flex-direction: column; gap: 24px; }
.cf-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
.cf-field { display: flex; flex-direction: column; gap: 8px; }
.cf-label {
  font-family: 'Geist Mono', ui-monospace, monospace;
  font-size: 12px; font-weight: 500; letter-spacing: 0.05em;
  text-transform: uppercase; color: var(--ink);
}
.cf-req { color: var(--accent); }
.cf-opt { color: var(--muted-2); font-weight: 400; text-transform: none; letter-spacing: 0; font-family: 'Geist', sans-serif; font-size: 11px; }
.cf-input {
  height: 50px; padding: 0 16px;
  border: 1px solid var(--rule); border-radius: var(--radius);
  background: var(--bg); color: var(--ink);
  font: inherit; font-size: 16px;
  transition: border-color .15s ease, box-shadow .15s ease;
  outline: none; width: 100%; box-sizing: border-box;
}
.cf-input:focus { border-color: var(--ink); box-shadow: 0 0 0 3px rgba(14,14,14,0.06); }
.cf-input::placeholder { color: var(--muted-2); }
.cf-field-err .cf-input { border-color: #d94b35; box-shadow: 0 0 0 3px rgba(217,75,53,0.07); }
.cf-textarea { height: auto; padding: 14px 16px; resize: vertical; min-height: 130px; line-height: 1.6; }
.cf-error { font-family: 'Geist Mono', ui-monospace, monospace; font-size: 12.5px; color: #d94b35; letter-spacing: 0.01em; }
.cf-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.cf-pill {
  height: 40px; padding: 0 18px; border-radius: 999px;
  border: 1px solid var(--rule); background: transparent;
  color: var(--ink); font: inherit; font-size: 15px; font-weight: 500;
  cursor: pointer; transition: background .14s ease, border-color .14s ease, color .14s ease;
  white-space: nowrap;
}
.cf-pill:hover { background: var(--bg-2); }
.cf-pill-on { background: var(--ink); border-color: var(--ink); color: #fff; }
.cf-pill-on:hover { filter: brightness(1.1); }
.cf-submit-btn { align-self: flex-start; margin-top: 4px; }
.cf-loading { opacity: 0.72; pointer-events: none; }
.cf-spinner { width: 32px; height: 32px; border-radius: 999px; background: rgba(255,255,255,0.18); display: grid; place-items: center; position: relative; }
.cf-spinner::after { content: ""; width: 13px; height: 13px; border-radius: 999px; border: 2px solid rgba(255,255,255,0.28); border-top-color: #fff; animation: cf-spin .65s linear infinite; }
@keyframes cf-spin { to { transform: rotate(360deg); } }
.cf-submit-error { font-size: 15px; color: #d94b35; padding: 14px 16px; background: rgba(217,75,53,0.05); border: 1px solid rgba(217,75,53,0.18); border-radius: 12px; line-height: 1.55; }
.cf-success { text-align: center; padding: 56px 32px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.cf-success-icon { width: 56px; height: 56px; border-radius: 999px; background: var(--accent); display: grid; place-items: center; margin-bottom: 12px; }
.cf-success h3 { font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin: 0; }
.cf-success p { color: var(--muted); font-size: 17px; margin: 0; max-width: 38ch; }
@media (max-width: 960px) {
  .cf-layout { grid-template-columns: 1fr; gap: 40px; }
  .cf-left { position: static; }
  .cf-card { padding: 28px; }
}
@media (max-width: 600px) {
  .cf-row { grid-template-columns: 1fr; gap: 20px; }
  .cf-card { padding: 20px; }
}

/* ── Footer ──────────────────────────────────────── */
.foot {
  background: var(--dark);
  color: #F4F2EE;

<body>
<div id="root"></div>
<script>
/**
 * <image-slot> — user-fillable image placeholder.
 *
 * Drop this into a deck, mockup, or page wherever you want the user to
 * supply an image. You control the slot's shape and size; the user fills it
 * by dragging an image file onto it (or clicking to browse). The dropped
 * image persists across reloads via a .image-slots.state.json sidecar —
 * same read-via-fetch / write-via-window.omelette pattern as
 * design_canvas.jsx, so the filled slot shows on share links, downloaded
 * zips, and PPTX export. Outside the omelette runtime the slot is read-only.
 *
 * The host bridge only allows sidecar writes at the project root, so the
 * HTML that uses this component is assumed to live at the project root too
 * (same constraint as design_canvas.jsx).
 *
 * Attributes:
 *   id           Persistence key. REQUIRED for the drop to survive reload —
 *                every slot on the page needs a distinct id.
 *   shape        'rect' | 'rounded' | 'circle' | 'pill'   (default 'rounded')
 *                'circle' applies 50% border-radius; on a non-square slot
 *                that's an ellipse — set equal width and height for a true
 *                circle.
 *   radius       Corner radius in px for 'rounded'.       (default 12)
 *   mask         Any CSS clip-path value. Overrides `shape` — use this for
 *                hexagons, blobs, arbitrary polygons.
 *   fit          object-fit: cover | contain | fill.       (default 'cover')
 *                With cover (the default) double-clicking the filled slot
 *                enters a reframe mode: the whole image spills past the mask
 *                (translucent outside, opaque inside), drag to reposition,
 *                corner-drag to scale. The crop persists alongside the image
 *                in the sidecar. contain/fill stay static.
 *   position     object-position for fit=contain|fill.     (default '50% 50%')
 *   placeholder  Empty-state caption.                      (default 'Drop an image')
 *   src          Optional initial/fallback image URL. A user drop overrides
 *                it; clearing the drop reveals src again.
 *
 * Size and layout come from ordinary CSS on the element — width/height
 * inline or from a parent grid — so it composes with any layout.
 *
 * Usage:
 *   <script src="image-slot.js"><\/script>
 *   <image-slot id="hero"   style="width:800px;height:450px" shape="rounded" radius="20"
 *               placeholder="Drop a hero image"></image-slot>
 *   <image-slot id="avatar" style="width:120px;height:120px" shape="circle"></image-slot>
 *   <image-slot id="kite"   style="width:300px;height:300px"
 *               mask="polygon(50% 0, 100% 50%, 50% 100%, 0 50%)"></image-slot>
 */

(() => {
  const STATE_FILE = '.image-slots.state.json';
  // 2× a ~600px slot in a 1920-wide deck — retina-sharp without making the
  // sidecar enormous. A 1200px WebP at q=0.85 is ~150-300KB.
  const MAX_DIM = 1200;
  // Raster formats only. SVG is excluded (can carry script; createImageBitmap
  // on SVG blobs is inconsistent). GIF is excluded because the canvas
  // re-encode keeps only the first frame, so an animated GIF would silently
  // go still — better to reject than surprise.
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  // ── Shared sidecar store ────────────────────────────────────────────────
  // One fetch + immediate write-on-change for every <image-slot> on the
  // page. Reads via fetch() so viewing works anywhere the HTML and sidecar
  // are served together; writes go through window.omelette.writeFile, which
  // the host allowlists to *.state.json basenames only.
  const subs = new Set();
  let slots = {};
  // ids explicitly cleared before the sidecar fetch resolved — otherwise
  // the merge below can't tell "never set" from "just deleted" and would
  // resurrect the sidecar's stale value.
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        // Merge: sidecar loses to any in-memory change that raced ahead of
        // the fetch (drop or clear) so neither is clobbered by hydration.
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          // A framing-only write that raced ahead of hydration must not
          // drop a user image that's only on disk — inherit u from the
          // sidecar for any in-memory entry that lacks one.
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  // Serialize writes so two near-simultaneous drops on different slots
  // can't reorder at the backend and leave the sidecar with only the
  // first. A save requested mid-flight just marks dirty and re-fires on
  // completion with the then-current slots.
  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  // Normalize a stored slot value. Pre-reframe sidecars stored a bare
  // data-URL string; newer ones store {u, s, x, y}. Either shape is valid.
  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    // A drop is rare + high-value — write immediately so nav-away can't lose
    // it. Gate on the initial read so we don't overwrite a sidecar we haven't
    // merged yet; the merge in load() keeps this change once the read lands.
    if (loaded) save(); else load().then(save);
  }

  // ── Image downscale ─────────────────────────────────────────────────────
  // Encode through a canvas so the sidecar carries resized bytes, not the
  // raw upload. Longest side is capped at 2× the slot's rendered width
  // (retina) and at MAX_DIM. WebP keeps alpha and is ~10× smaller than PNG
  // for photos, so there's no need for per-image format picking.
  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(bitmap, 0, 0, w, h);
      return canvas.toDataURL('image/webp', 0.85);
    } finally {
      bitmap.close && bitmap.close();
    }
  }

  // ── Custom element ──────────────────────────────────────────────────────
  const stylesheet =
    ':host{display:inline-block;position:relative;vertical-align:top;' +
    '  font:13px/1.3 system-ui,-apple-system,sans-serif;color:rgba(0,0,0,.55);width:240px;height:160px}' +
    '.frame{position:absolute;inset:0;overflow:hidden;background:rgba(0,0,0,.04)}' +
    // .frame img (clipped) and .spill (unclipped ghost + handles) share the
    // same left/top/width/height in frame-%, computed by _applyView(), so the
    // inside-mask crop and the outside-mask spill stay pixel-aligned.
    '.frame img{position:absolute;max-width:none;transform:translate(-50%,-50%);' +
    '  -webkit-user-drag:none;user-select:none;touch-action:none}' +
    // Reframe mode (double-click): the full image spills past the mask. The
    // spill layer is sized to the IMAGE bounds so its corners are where the
    // resize handles belong. The ghost <img> inside is translucent; the real
    // clipped <img> underneath shows the opaque in-mask crop.
    '.spill{position:absolute;transform:translate(-50%,-50%);display:none;z-index:1;' +
    '  cursor:grab;touch-action:none}' +
    ':host([data-panning]) .spill{cursor:grabbing}' +
    '.spill .ghost{position:absolute;inset:0;width:100%;height:100%;opacity:.35;' +
    '  pointer-events:none;-webkit-user-drag:none;user-select:none;' +
    '  box-shadow:0 0 0 1px rgba(0,0,0,.2),0 12px 32px rgba(0,0,0,.2)}' +
    '.spill .handle{position:absolute;width:12px;height:12px;border-radius:50%;' +
    '  background:#fff;box-shadow:0 0 0 1.5px #c96442,0 1px 3px rgba(0,0,0,.3);' +
    '  transform:translate(-50%,-50%)}' +
    '.spill .handle[data-c=nw]{left:0;top:0;cursor:nwse-resize}' +
    '.spill .handle[data-c=ne]{left:100%;top:0;cursor:nesw-resize}' +
    '.spill .handle[data-c=sw]{left:0;top:100%;cursor:nesw-resize}' +
    '.spill .handle[data-c=se]{left:100%;top:100%;cursor:nwse-resize}' +
    ':host([data-reframe]){z-index:10}' +
    ':host([data-reframe]) .spill{display:block}' +
    ':host([data-reframe]) .frame{box-shadow:0 0 0 2px #c96442}' +
    '.empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;' +
    '  justify-content:center;gap:6px;text-align:center;padding:12px;box-sizing:border-box;' +
    '  cursor:pointer;user-select:none}' +
    '.empty svg{opacity:.45}' +
    '.empty .cap{max-width:90%;font-weight:500;letter-spacing:.01em}' +
    '.empty .sub{font-size:11px}' +
    '.empty .sub u{text-underline-offset:2px;text-decoration-color:rgba(0,0,0,.25)}' +
    '.empty:hover .sub u{color:rgba(0,0,0,.75);text-decoration-color:currentColor}' +
    ':host([data-over]) .frame{outline:2px solid #c96442;outline-offset:-2px;' +
    '  background:rgba(201,100,66,.10)}' +
    '.ring{position:absolute;inset:0;pointer-events:none;border:1.5px dashed rgba(0,0,0,.25);' +
    '  transition:border-color .12s}' +
    ':host([data-over]) .ring{border-color:#c96442}' +
    ':host([data-filled]) .ring{display:none}' +
    // Controls sit BELOW the mask (top:100%), absolutely positioned so the
    // author-declared slot height is unaffected. The gap is padding, not a
    // top offset, so the hover target stays contiguous with the frame.
    '.ctl{position:absolute;top:100%;left:50%;transform:translateX(-50%);padding-top:8px;' +
    '  display:flex;gap:6px;opacity:0;pointer-events:none;transition:opacity .12s;z-index:2;' +
    '  white-space:nowrap}' +
    ':host([data-filled][data-editable]:hover) .ctl,:host([data-reframe]) .ctl' +
    '  {opacity:1;pointer-events:auto}' +
    '.ctl button{appearance:none;border:0;border-radius:6px;padding:5px 10px;cursor:pointer;' +
    '  background:rgba(0,0,0,.65);color:#fff;font:11px/1 system-ui,-apple-system,sans-serif;' +
    '  backdrop-filter:blur(6px)}' +
    '.ctl button:hover{background:rgba(0,0,0,.8)}' +
    '.err{position:absolute;left:8px;bottom:8px;right:8px;color:#b3261e;font-size:11px;' +
    '  background:rgba(255,255,255,.85);padding:4px 6px;border-radius:5px;pointer-events:none}';

  const icon =
    '<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" ' +
    'stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">' +
    '<rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>' +
    '<path d="m21 15-5-5L5 21"/></svg>';

  class ImageSlot extends HTMLElement {
    static get observedAttributes() {
      return ['shape', 'radius', 'mask', 'fit', 'position', 'placeholder', 'src', 'id'];
    }

    constructor() {
      super();
      const root = this.attachShadow({ mode: 'open' });
      // .spill and .ctl sit OUTSIDE .frame so overflow:hidden + border-radius
      // on the frame (circle, pill, rounded) can't clip them.
      root.innerHTML =
        '<style>' + stylesheet + '</style>' +
        '<div class="frame" part="frame">' +
        '  <img part="image" alt="" draggable="false" style="display:none">' +
        '  <div class="empty" part="empty">' + icon +
        '    <div class="cap"></div>' +
        '    <div class="sub">or <u>browse files</u></div></div>' +
        '  <div class="ring" part="ring"></div>' +
        '</div>' +
        '<div class="spill">' +
        '  <img class="ghost" alt="" draggable="false">' +
        '  <div class="handle" data-c="nw"></div><div class="handle" data-c="ne"></div>' +
        '  <div class="handle" data-c="sw"></div><div class="handle" data-c="se"></div>' +
        '</div>' +
        '<div class="ctl"><button data-act="replace" title="Replace image">Replace</button>' +
        '  <button data-act="clear" title="Remove image">Remove</button></div>' +
        '<input type="file" accept="' + ACCEPT.join(',') + '" hidden>';
      this._frame = root.querySelector('.frame');
      this._ring = root.querySelector('.ring');
      this._img = root.querySelector('.frame img');
      this._empty = root.querySelector('.empty');
      this._cap = root.querySelector('.cap');
      this._sub = root.querySelector('.sub');
      this._spill = root.querySelector('.spill');
      this._ghost = root.querySelector('.ghost');
      this._err = null;
      this._input = root.querySelector('input');
      this._depth = 0;
      this._gen = 0;
      this._view = { s: 1, x: 0, y: 0 };
      this._subFn = () => this._render();
      // Shadow-DOM listeners live with the shadow DOM — bound once here so
      // disconnect/reconnect (e.g. React remount) doesn't stack handlers.
      this._empty.addEventListener('click', () => this._input.click());
      root.addEventListener('click', (e) => {
        const act = e.target && e.target.getAttribute && e.target.getAttribute('data-act');
        if (act === 'replace') { this._exitReframe(true); this._input.click(); }
        if (act === 'clear') {
          this._exitReframe(false);
          this._gen++;
          this._local = null;
          if (this.id) setSlot(this.id, null); else this._render();
        }
      });
      this._input.addEventListener('change', () => {
        const f = this._input.files && this._input.files[0];
        if (f) this._ingest(f);
        this._input.value = '';
      });

      // baseline is computed from real dimensions, not the 100%×100% fallback.

      // stay static.

        e.preventDefault();

        else this._enterReframe();
      });

      // reframed slot survives responsive resize / PPTX export.
      this._spill.addEventListener('pointerdown', (e) => {
        if (e.button !== 0 || !this.hasAttribute('data-reframe')) return;
        e.preventDefault();
        e.stopPropagation();
        this._spill.setPointerCapture(e.pointerId);
        const rect = this.getBoundingClientRect();
        const fw = rect.width || 1, fh = rect.height || 1;
        const corner = e.target.getAttribute && e.target.getAttribute('data-c');

          // fw/fh, not clientWidth) so the math survives a transform:scale()
          // ancestor — deck_stage renders slides scaled-to-fit.
          const iw = this._img.naturalWidth || 1, ih = this._img.naturalHeight || 1;
          const base = Math.max(fw / iw, fh / ih);
          const sx = corner.includes('e') ? 1 : -1;
          const sy = corner.includes('s') ? 1 : -1;
          const s0 = this._view.s;
          const w0 = iw * base * s0, h0 = ih * base * s0;
          const cx0 = (50 + this._view.x) / 100 * fw;
          const cy0 = (50 + this._view.y) / 100 * fh;
          const ox = cx0 - sx * w0 / 2, oy = cy0 - sy * h0 / 2;
          const diag0 = Math.hypot(w0, h0);
          const ux = sx * w0 / diag0, uy = sy * h0 / diag0;
          move = (ev) => {
            const proj = (ev.clientX - rect.left - ox) * ux +
                         (ev.clientY - rect.top - oy) * uy;
            const s = clampS(s0 * proj / diag0);
            const d = diag0 * s / s0;
            this._view.s = s;
            this._view.x = (ox + ux * d / 2) / fw * 100 - 50;
            this._view.y = (oy + uy * d / 2) / fh * 100 - 50;
            this._clampView();
            this._applyView();
          };

          this.setAttribute('data-panning', '');
          const start = { px: e.clientX, py: e.clientY, x: this._view.x, y: this._view.y };
          move = (ev) => {
            this._view.x = start.x + (ev.clientX - start.px) / fw * 100;
            this._view.y = start.y + (ev.clientY - start.py) / fh * 100;
            this._clampView();
            this._applyView();
          };

        const up = () => {
          try { this._spill.releasePointerCapture(e.pointerId); } catch {}
          this._spill.removeEventListener('pointermove', move);
          this._spill.removeEventListener('pointerup', up);
          this._spill.removeEventListener('pointercancel', up);
          this.removeAttribute('data-panning');
          this._dragUp = null;
        };

        // tear the capture + listeners down synchronously.
        this._dragUp = up;
        this._spill.addEventListener('pointermove', move);
        this._spill.addEventListener('pointerup', up);
        this._spill.addEventListener('pointercancel', up);

        const cx = (e.clientX - r.left) / r.width * 100 - 50;
        const cy = (e.clientY - r.top) / r.height * 100 - 50;
        const prev = this._view.s;
        const next = clampS(prev * Math.pow(1.0015, -e.deltaY));
        if (next === prev) return;
        const k = next / prev;

        this._view.x = cx * (1 - k) + this._view.x * k;

    connectedCallback() {

      // cannot persist, and two id-less slots would share nothing.

      // image until the next _render. Re-render on size change: _render()

      // frame's clamp range.

    disconnectedCallback() {
      subs.delete(this._subFn);
      this.removeEventListener('dragenter', this);
      this.removeEventListener('dragover', this);
      this.removeEventListener('dragleave', this);
      this.removeEventListener('drop', this);
      if (this._ro) { this._ro.disconnect(); this._ro = null; }

    _enterReframe() {
      if (this.hasAttribute('data-reframe')) return;
      this.setAttribute('data-reframe', '');
      this._applyView();
      // Close on click outside (the spill handler stopPropagation()s so
      // in-image drags don't reach this) and on Escape. Listeners are held
      // on the instance so _exitReframe / disconnectedCallback can detach
      // exactly what was attached.
      this._outside = (e) => {
        if (e.composedPath && e.composedPath().includes(this)) return;
        this._exitReframe(true);
      };
      this._esc = (e) => { if (e.key === 'Escape') this._exitReframe(true); };
      document.addEventListener('pointerdown', this._outside, true);
      document.addEventListener('keydown', this._esc, true);
    }

    _exitReframe(commit) {
      if (!this.hasAttribute('data-reframe')) return;
      if (this._dragUp) this._dragUp();
      this.removeAttribute('data-reframe');
      this.removeAttribute('data-panning');
      if (this._outside) document.removeEventListener('pointerdown', this._outside, true);
      if (this._esc) document.removeEventListener('keydown', this._esc, true);
      this._outside = this._esc = null;
      if (commit) this._commitView();
    }

    attributeChangedCallback() { if (this.shadowRoot) this._render(); }

    // handleEvent — one listener object for all four drag events keeps the
    // add/remove symmetric and the depth counter correct.
    handleEvent(e) {
      if (e.type === 'dragenter' || e.type === 'dragover') {
        // Without preventDefault the browser never fires 'drop'.
        e.preventDefault();
        e.stopPropagation();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'copy';
        if (e.type === 'dragenter') this._depth++;
        this.setAttribute('data-over', '');
      } else if (e.type === 'dragleave') {
        // dragenter/leave fire for every descendant crossing — count depth
        // so hovering the icon inside the empty state doesn't flicker.
        if (--this._depth <= 0) { this._depth = 0; this.removeAttribute('data-over'); }
      } else if (e.type === 'drop') {
        e.preventDefault();
        e.stopPropagation();
        this._depth = 0;
        this.removeAttribute('data-over');
        const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
        if (f) this._ingest(f);
      }

    async _ingest(file) {
      this._setError(null);
      if (!file || ACCEPT.indexOf(file.type) < 0) {
        this._setError('Drop a PNG, JPEG, WebP, or AVIF image.');
        return;
      }
      // toDataUrl can take hundreds of ms on a large photo. A Clear or a
      // newer drop during that window would be clobbered when this await
      // resumes — bump + capture a generation so stale encodes bail.
      const gen = ++this._gen;
      try {
        const w = this.clientWidth || this.offsetWidth || MAX_DIM;
        const url = await toDataUrl(file, w);
        if (gen !== this._gen) return;
        // Only exit reframe once the new image is in hand — a rejected type
        // or decode failure leaves the in-progress crop untouched.
        this._exitReframe(false);
        const val = { u: url, s: 1, x: 0, y: 0 };
        setSlot(this.id || '', val);
        // Keep a session-local copy for id-less slots so the drop still
        // shows, even though it cannot persist.
        if (!this.id) { this._local = val; this._render(); }
      } catch (err) {
        if (gen !== this._gen) return;
        this._setError('Could not read that image.');
        console.warn('<image-slot> ingest failed:', err);
      }
    }

    _setError(msg) {
      if (this._err) { this._err.remove(); this._err = null; }
      if (!msg) return;
      const d = document.createElement('div');
      d.className = 'err'; d.textContent = msg;
      this.shadowRoot.appendChild(d);
      this._err = d;
      setTimeout(() => { if (this._err === d) { d.remove(); this._err = null; } }, 3000);
    }

    // Reframing (pan/resize) is only meaningful for fit=cover — contain/fill
    // keep the old object-fit path and double-click is a no-op.
    _reframes() {
      return this.hasAttribute('data-filled') &&
        (this.getAttribute('fit') || 'cover') === 'cover';
    }

    // Cover-baseline geometry, shared by clamp/apply/resize. Null until the
    // img has loaded (naturalWidth is 0 before that) or when the slot has no
    // layout box — ResizeObserver fires with a 0×0 rect under display:none,
    // and clamping against a degenerate 1×1 frame would silently pull the
    // stored pan toward zero.
    _geom() {
      const iw = this._img.naturalWidth, ih = this._img.naturalHeight;
      const fw = this.clientWidth, fh = this.clientHeight;
      if (!iw || !ih || !fw || !fh) return null;
      return { iw, ih, fw, fh, base: Math.max(fw / iw, fh / ih) };
    }

    _clampView() {
      // Pan range on each axis is half the overflow past the frame edge.
      const g = this._geom();
      if (!g) return;
      const mx = Math.max(0, (g.iw * g.base * this._view.s / g.fw - 1) * 50);
      const my = Math.max(0, (g.ih * g.base * this._view.s / g.fh - 1) * 50);
      this._view.x = Math.max(-mx, Math.min(mx, this._view.x));
      this._view.y = Math.max(-my, Math.min(my, this._view.y));
    }

    _applyView() {
      const g = this._geom();
      const fit = this.getAttribute('fit') || 'cover';
      if (fit !== 'cover' || !g) {
        // Non-cover, or dimensions not known yet (before img load).
        this._img.style.width = '100%';
        this._img.style.height = '100%';
        this._img.style.left = '50%';
        this._img.style.top = '50%';
        this._img.style.objectFit = fit;
        this._img.style.objectPosition = this.getAttribute('position') || '50% 50%';
        return;
      }
      // Cover baseline: img fills the frame on its tighter axis at s=1, so
      // pan works immediately on the overflowing axis without zooming first.
      // Width/height and left/top are all frame-% — depends only on the
      // frame aspect ratio, so a responsive resize keeps the same crop. The
      // spill layer mirrors the same box so its corners = image corners.
      const k = g.base * this._view.s;
      const w = (g.iw * k / g.fw * 100) + '%';
      const h = (g.ih * k / g.fh * 100) + '%';
      const l = (50 + this._view.x) + '%';
      const t = (50 + this._view.y) + '%';
      this._img.style.width = w; this._img.style.height = h;
      this._img.style.left = l; this._img.style.top = t;
      this._img.style.objectFit = '';
      this._spill.style.width = w; this._spill.style.height = h;
      this._spill.style.left = l; this._spill.style.top = t;
    }

    _commitView() {
      const v = { s: this._view.s, x: this._view.x, y: this._view.y };
      if (this._userUrl) v.u = this._userUrl;
      // Framing-only (no u) persists too so an author-src slot remembers its
      // crop; clearing the sidecar still falls through to src=.
      if (this.id) setSlot(this.id, v);
      else { this._local = v; }
    }

    _render() {
      // Shape / mask. Presets use border-radius so the dashed ring can
      // follow the rounded outline; clip-path is only applied for an
      // explicit `mask` (the ring is hidden there since a rectangle
      // dashed border chopped by an arbitrary polygon looks broken).
      const mask = this.getAttribute('mask');
      const shape = (this.getAttribute('shape') || 'rounded').toLowerCase();
      let radius = '';
      if (shape === 'circle') radius = '50%';
      else if (shape === 'pill') radius = '9999px';
      else if (shape === 'rounded') {
        const n = parseFloat(this.getAttribute('radius'));
        radius = (Number.isFinite(n) ? n : 12) + 'px';
      }
      this._frame.style.borderRadius = mask ? '' : radius;
      this._frame.style.clipPath = mask || '';
      this._ring.style.borderRadius = mask ? '' : radius;
      this._ring.style.display = mask ? 'none' : '';

      // Controls and reframe entry gate on this so share links stay read-only.
      const editable = !!(window.omelette && window.omelette.writeFile);
      this.toggleAttribute('data-editable', editable);
      this._sub.style.display = editable ? '' : 'none';

      // Content. The sidecar is also writable by the agent's write_file
      // tool, so its value isn't guaranteed canvas-originated — only accept
      // data:image/ URLs from it. The `src` attribute is author-controlled
      // (Claude wrote it into the HTML) so it passes through unchanged.
      let stored = this.id ? getSlot(this.id) : this._local;
      if (stored && stored.u && !/^data:image\//i.test(stored.u)) stored = null;
      const srcAttr = this.getAttribute('src') || '';
      this._userUrl = (stored && stored.u) || null;
      const url = this._userUrl || srcAttr;
      // Don't clobber an in-flight reframe with a store-triggered re-render.
      if (!this.hasAttribute('data-reframe')) {
        this._view = {
          s: stored && Number.isFinite(stored.s) ? clampS(stored.s) : 1,
          x: stored && Number.isFinite(stored.x) ? stored.x : 0,
          y: stored && Number.isFinite(stored.y) ? stored.y : 0,
        };
      }
      this._cap.textContent = this.getAttribute('placeholder') || 'Drop an image';
      // Toggle via style.display — the [hidden] attribute alone loses to
      // the display:flex / display:block rules in the stylesheet above.
      if (url) {
        if (this._img.getAttribute('src') !== url) {
          this._img.src = url;
          this._ghost.src = url;
        }
        this._img.style.display = 'block';
        this._empty.style.display = 'none';
        this.setAttribute('data-filled', '');
        this._clampView();
        this._applyView();
      } else {
        this._img.style.display = 'none';
        this._img.removeAttribute('src');
        this._ghost.removeAttribute('src');
        this._empty.style.display = 'flex';
        this.removeAttribute('data-filled');
      }
    }
  }

  if (!customElements.get('image-slot')) {
    customElements.define('image-slot', ImageSlot);
  }
})();
